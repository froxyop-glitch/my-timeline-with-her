  :root{
    --bg-ink:#241726;
    --bg-soft:#2f1d34;

    --rose:#E8917E;

    --ivory:#F6ECE2;
    --muted:#B79CB8;
    --thread:#5c3f61;
    --serif:'Fraunces', serif;
    --sans:'Work Sans', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  body{
    background:var(--bg-ink);
    color:var(--ivory);
    font-family:var(--sans);
    font-weight:300;
    line-height:1.6;
    overflow-x:hidden;
  }

  ::selection{background:var(--rose);color:var(--bg-ink);}
  a{color:inherit;}
  :focus-visible{ outline:2px solid var(--gold); outline-offset:4px; }
  h1,h2,h3{font-family:var(--serif);font-weight:500;}
  .wrap{ max-width:920px; margin:0 auto; padding:0 28px; }

  .mark{
    position:fixed; top:28px; left:28px; font-family:var(--mono); font-size:0.72rem;
    letter-spacing:0.12em; color:var(--muted); opacity:0; transform:translateY(-6px);
    transition:opacity .6s ease, transform .6s ease; z-index:40; pointer-events:none;
  }
  .mark.visible{opacity:1;transform:translateY(0);}
  .mark em{font-style:normal;color:var(--rose);}
